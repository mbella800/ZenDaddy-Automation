<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280, height=720">
  <title>ZenDaddy Gumroad Banner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 1280px;
      height: 720px;
      background: #000;
      font-family: 'Courier New', monospace;
      position: relative;
      overflow: hidden;
    }

    /* Matrix Rain Background */
    .matrix-rain {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #000 0%, #001100 100%);
    }

    .matrix-rain::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 0, 0.03) 2px, rgba(0, 255, 0, 0.03) 4px),
        repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0, 255, 0, 0.03) 2px, rgba(0, 255, 0, 0.03) 4px);
    }

    /* Falling code effect */
    .code {
      position: absolute;
      color: #00ff00;
      opacity: 0.4;
      font-size: 20px;
      animation: fall linear infinite;
      text-shadow: 0 0 10px #00ff00;
    }

    @keyframes fall {
      from { transform: translateY(-100%); opacity: 0.6; }
      to { transform: translateY(720px); opacity: 0; }
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
    }

    .logo {
      font-size: 120px;
      font-weight: bold;
      color: #00ff00;
      text-shadow: 
        0 0 20px #00ff00,
        0 0 40px #00ff00,
        0 0 60px #00ff00;
      letter-spacing: 8px;
      margin-bottom: 20px;
    }

    .subtitle {
      font-size: 42px;
      color: #00ff00;
      margin-bottom: 50px;
      letter-spacing: 4px;
    }

    .features {
      position: absolute;
      left: 60px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 15px;
      font-size: 24px;
      color: #fff;
    }

    .checkmark {
      color: #00ff00;
      font-size: 28px;
      font-weight: bold;
    }

    .price {
      position: absolute;
      bottom: 60px;
      right: 60px;
      font-size: 56px;
      color: #00ff00;
      border: 4px solid #00ff00;
      padding: 20px 40px;
      box-shadow: 
        0 0 20px rgba(0, 255, 0, 0.5),
        inset 0 0 20px rgba(0, 255, 0, 0.2);
    }

    /* Grid lines */
    .grid {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 200px;
      background: 
        linear-gradient(90deg, transparent 0%, transparent calc(100% - 1px), rgba(0, 255, 0, 0.1) calc(100% - 1px)),
        linear-gradient(0deg, transparent 0%, transparent calc(100% - 1px), rgba(0, 255, 0, 0.1) calc(100% - 1px));
      background-size: 100px 50px;
      opacity: 0.3;
      transform: perspective(500px) rotateX(60deg);
      transform-origin: bottom;
    }
  </style>
</head>
<body>
  <div class="matrix-rain"></div>
  
  <!-- Falling code -->
  <div class="code" style="left: 5%; animation-duration: 8s; animation-delay: 0s;">1010101</div>
  <div class="code" style="left: 15%; animation-duration: 6s; animation-delay: 1s;">010101</div>
  <div class="code" style="left: 25%; animation-duration: 7s; animation-delay: 0.5s;">110110</div>
  <div class="code" style="left: 35%; animation-duration: 9s; animation-delay: 2s;">010010</div>
  <div class="code" style="left: 45%; animation-duration: 5s; animation-delay: 1.5s;">101011</div>
  <div class="code" style="left: 55%; animation-duration: 8s; animation-delay: 0.8s;">011010</div>
  <div class="code" style="left: 65%; animation-duration: 6s; animation-delay: 2.5s;">110101</div>
  <div class="code" style="left: 75%; animation-duration: 7s; animation-delay: 1.2s;">010110</div>
  <div class="code" style="left: 85%; animation-duration: 9s; animation-delay: 0.3s;">101010</div>
  <div class="code" style="left: 95%; animation-duration: 6s; animation-delay: 1.8s;">011011</div>

  <div class="grid"></div>

  <div class="content">
    <div class="logo">ZENDADDY</div>
    <div class="subtitle">MAGNETIC AIM v2.0</div>
  </div>

  <div class="features">
    <div class="feature">
      <span class="checkmark">✓</span>
      <span>8 OLED SLIDERS</span>
    </div>
    <div class="feature">
      <span class="checkmark">✓</span>
      <span>ADVANCED AI ALGORITHMS</span>
    </div>
    <div class="feature">
      <span class="checkmark">✓</span>
      <span>CRONUS ZEN COMPATIBLE</span>
    </div>
    <div class="feature">
      <span class="checkmark">✓</span>
      <span>FORTNITE OPTIMIZED</span>
    </div>
  </div>

  <div class="price">$69.99</div>
</body>
</html>
